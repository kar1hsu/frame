version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?set in deploy/.env}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-frame}"
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set in deploy/.env}"]
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_HOST=mysql
      - REDIS_HOST=redis
      - TIMEZONE=${TZ:-Asia/Shanghai}
    volumes:
      - ./config.yaml:/app/config/config.yaml
      - app_logs:/app/logs

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["./worker"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_HOST=mysql
      - REDIS_HOST=redis
      - TIMEZONE=${TZ:-Asia/Shanghai}
    volumes:
      - ./config.yaml:/app/config/config.yaml
      - app_logs:/app/logs

  # 定时任务调度器：必须单实例，切勿 scale > 1（asynq.Scheduler 无选主）
  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["./scheduler"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_HOST=mysql
      - REDIS_HOST=redis
      - TIMEZONE=${TZ:-Asia/Shanghai}
    volumes:
      - ./config.yaml:/app/config/config.yaml
      - app_logs:/app/logs

volumes:
  mysql_data:
  redis_data:
  app_logs:
